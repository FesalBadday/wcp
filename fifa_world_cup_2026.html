<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#172033', 950: '#020617' },
                    },
                    boxShadow: {
                        'glow-blue': '0 0 15px -3px rgba(59, 130, 246, 0.5)',
                        'glow-yellow': '0 0 20px -3px rgba(234, 179, 8, 0.6)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Modern Clean Scrollbars */
        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        body {
            background-color: #020617;
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .bracket-line-r {
            border-right: 2px solid #475569;
        }

        .bracket-line-l {
            border-left: 2px solid #475569;
        }

        .bracket-line-t {
            border-top: 2px solid #475569;
        }

        .bracket-line-b {
            border-bottom: 2px solid #475569;
        }

        .group:hover .bracket-line-r,
        .group:hover .bracket-line-l,
        .group:hover .bracket-line-t,
        .group:hover .bracket-line-b {
            border-color: #3b82f6;
            /* blue-500 */
        }
    </style>
</head>

<body class="selection:bg-blue-500 selection:text-white antialiased bg-slate-950">

    <!-- Header -->
    <header
        class="bg-slate-900/80 backdrop-blur-md text-white p-4 border-b border-slate-800/50 flex justify-between items-center sticky top-0 z-40 shadow-lg">
        <div class="flex items-center space-x-3">
            <div
                class="w-8 h-8 bg-gradient-to-br from-blue-500 to-blue-700 rounded-lg flex items-center justify-center text-lg shadow-inner">
                🏆</div>
            <h1
                class="text-xl font-bold tracking-tight hidden sm:block bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-300">
                World Cup '26</h1>
        </div>
        <div id="header-actions"></div>
    </header>

    <!-- Main Content Container -->
    <main id="app-container" class="min-h-[calc(100vh-64px)]">
        <div class="flex items-center justify-center h-[calc(100vh-64px)]">
            <div class="animate-spin text-5xl">⚽</div>
        </div>
    </main>

    <!-- App Logic -->
    <script>
        const STORAGE_KEY = 'fifa-world-cup-2026-data-v2';

        // Tournament Data
        const TEAMS = {
            "MX": { name: "Mexico", code: "mx" }, "ZA": { name: "South Africa", code: "za" }, "KR": { name: "South Korea", code: "kr" }, "CZ": { name: "Czechia", code: "cz" },
            "CA": { name: "Canada", code: "ca" }, "BA": { name: "Bosnia & Herz.", code: "ba" }, "QA": { name: "Qatar", code: "qa" }, "CH": { name: "Switzerland", code: "ch" },
            "BR": { name: "Brazil", code: "br" }, "MA": { name: "Morocco", code: "ma" }, "HT": { name: "Haiti", code: "ht" }, "GB-SCT": { name: "Scotland", code: "gb-sct" },
            "US": { name: "United States", code: "us" }, "PY": { name: "Paraguay", code: "py" }, "AU": { name: "Australia", code: "au" }, "TR": { name: "Türkiye", code: "tr" },
            "DE": { name: "Germany", code: "de" }, "CW": { name: "Curaçao", code: "cw" }, "CI": { name: "Ivory Coast", code: "ci" }, "EC": { name: "Ecuador", code: "ec" },
            "NL": { name: "Netherlands", code: "nl" }, "JP": { name: "Japan", code: "jp" }, "SE": { name: "Sweden", code: "se" }, "TN": { name: "Tunisia", code: "tn" },
            "BE": { name: "Belgium", code: "be" }, "EG": { name: "Egypt", code: "eg" }, "IR": { name: "Iran", code: "ir" }, "NZ": { name: "New Zealand", code: "nz" },
            "ES": { name: "Spain", code: "es" }, "CV": { name: "Cabo Verde", code: "cv" }, "SA": { name: "Saudi Arabia", code: "sa" }, "UY": { name: "Uruguay", code: "uy" },
            "FR": { name: "France", code: "fr" }, "SN": { name: "Senegal", code: "sn" }, "IQ": { name: "Iraq", code: "iq" }, "NO": { name: "Norway", code: "no" },
            "AR": { name: "Argentina", code: "ar" }, "DZ": { name: "Algeria", code: "dz" }, "AT": { name: "Austria", code: "at" }, "JO": { name: "Jordan", code: "jo" },
            "PT": { name: "Portugal", code: "pt" }, "CD": { name: "DR Congo", code: "cd" }, "UZ": { name: "Uzbekistan", code: "uz" }, "CO": { name: "Colombia", code: "co" },
            "GB-ENG": { name: "England", code: "gb-eng" }, "HR": { name: "Croatia", code: "hr" }, "GH": { name: "Ghana", code: "gh" }, "PA": { name: "Panama", code: "pa" }
        };

        const GROUPS = {
            A: ["MX", "ZA", "KR", "CZ"], B: ["CA", "BA", "QA", "CH"], C: ["BR", "MA", "HT", "GB-SCT"], D: ["US", "PY", "AU", "TR"],
            E: ["DE", "CW", "CI", "EC"], F: ["NL", "JP", "SE", "TN"], G: ["BE", "EG", "IR", "NZ"], H: ["ES", "CV", "SA", "UY"],
            I: ["FR", "SN", "IQ", "NO"], J: ["AR", "DZ", "AT", "JO"], K: ["PT", "CD", "UZ", "CO"], L: ["GB-ENG", "HR", "GH", "PA"]
        };

        const ROUNDS = ['r32', 'r16', 'qf', 'sf', 'final'];

        // App State
        let state = {
            stage: 'groups',
            groupSelections: {},
            thirdPlaces: [],
            bracket: null,
            resetConfirm: false
        };

        let saveTimeout = null;
        let intentionalScrollReset = false;

        function setState(newState) {
            state = { ...state, ...newState };
            renderApp();

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        groupSelections: state.groupSelections,
                        thirdPlaces: state.thirdPlaces,
                        bracket: state.bracket,
                        stage: state.stage
                    }));
                } catch (e) { console.error("Save failed", e); }
            }, 300);
        }

        function initApp() {
            try {
                const savedData = localStorage.getItem(STORAGE_KEY);
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    state.groupSelections = parsed.groupSelections || {};
                    state.thirdPlaces = parsed.thirdPlaces || [];
                    state.bracket = parsed.bracket || null;
                    state.stage = parsed.stage || 'groups';
                }
            } catch (e) { console.error("Load failed", e); }
            renderApp();
        }

        // Actions
        window.handleReset = () => {
            if (state.resetConfirm) {
                intentionalScrollReset = true;
                setState({ groupSelections: {}, thirdPlaces: [], bracket: null, stage: 'groups', resetConfirm: false });
            } else {
                setState({ resetConfirm: true });
                setTimeout(() => { if (state.resetConfirm) setState({ resetConfirm: false }); }, 3000);
            }
        };

        window.handleGroupTeamClick = (groupName, teamId) => {
            const current = state.groupSelections[groupName] || [];
            let newSelection;
            if (current.includes(teamId)) newSelection = current.filter(t => t !== teamId);
            else if (current.length < 2) newSelection = [...current, teamId];
            else return;
            setState({ groupSelections: { ...state.groupSelections, [groupName]: newSelection } });
        };

        window.handleThirdPlaceClick = (teamId) => {
            const current = state.thirdPlaces;
            let newThirds;
            if (current.includes(teamId)) newThirds = current.filter(t => t !== teamId);
            else if (current.length < 8) newThirds = [...current, teamId];
            else return;
            setState({ thirdPlaces: newThirds });
        };

        window.proceedToThirds = () => {
            intentionalScrollReset = true;
            setState({ stage: 'thirds' });
        };

        window.generateBracket = () => {
            intentionalScrollReset = true;
            const firsts = Object.keys(GROUPS).map(g => state.groupSelections[g]?.[0]);
            const seconds = Object.keys(GROUPS).map(g => state.groupSelections[g]?.[1]);

            // Uniquely mapping 12 firsts, 12 seconds, and 8 thirds = exactly 32 distinct teams mapped to 16 matches
            const r32 = [
                // Left Side (8 matches)
                { t1: firsts[0], t2: state.thirdPlaces[0], winner: null },
                { t1: seconds[0], t2: seconds[1], winner: null },
                { t1: firsts[1], t2: state.thirdPlaces[1], winner: null },
                { t1: seconds[2], t2: seconds[3], winner: null },
                { t1: firsts[2], t2: state.thirdPlaces[2], winner: null },
                { t1: seconds[4], t2: seconds[5], winner: null },
                { t1: firsts[3], t2: state.thirdPlaces[3], winner: null },
                { t1: firsts[4], t2: seconds[6], winner: null },
                // Right Side (8 matches)
                { t1: firsts[5], t2: state.thirdPlaces[4], winner: null },
                { t1: firsts[6], t2: seconds[7], winner: null },
                { t1: firsts[7], t2: state.thirdPlaces[5], winner: null },
                { t1: firsts[8], t2: seconds[8], winner: null },
                { t1: firsts[9], t2: state.thirdPlaces[6], winner: null },
                { t1: firsts[10], t2: seconds[9], winner: null },
                { t1: firsts[11], t2: state.thirdPlaces[7], winner: null },
                { t1: seconds[10], t2: seconds[11], winner: null }
            ];

            const bracket = {
                r32: r32,
                r16: Array.from({ length: 8 }, () => ({ t1: null, t2: null, winner: null })),
                qf: Array.from({ length: 4 }, () => ({ t1: null, t2: null, winner: null })),
                sf: Array.from({ length: 2 }, () => ({ t1: null, t2: null, winner: null })),
                final: Array.from({ length: 1 }, () => ({ t1: null, t2: null, winner: null })),
                bronze: Array.from({ length: 1 }, () => ({ t1: null, t2: null, winner: null })) // Add Bronze match
            };
            setState({ bracket, stage: 'knockout' });
        };

        const clearDownstream = (bracketMut, fromRound, matchIndex) => {
            const startIdx = ROUNDS.indexOf(fromRound);
            let currIdx = matchIndex;
            for (let i = startIdx; i < ROUNDS.length; i++) {
                const r = ROUNDS[i];
                bracketMut[r][currIdx].winner = null;

                // Clear Final/Bronze
                if (r === 'final') bracketMut.final[0].winner = null;
                if (r === 'sf') bracketMut.bronze[0] = { t1: null, t2: null, winner: null };

                if (i < ROUNDS.length - 1) {
                    const nextR = ROUNDS[i + 1];
                    const nextIdx = Math.floor(currIdx / 2);
                    if (currIdx % 2 === 0) bracketMut[nextR][nextIdx].t1 = null;
                    else bracketMut[nextR][nextIdx].t2 = null;
                    currIdx = nextIdx;
                }
            }
        };

        window.advanceWinner = (round, matchIndex, teamId) => {
            const nextBracket = JSON.parse(JSON.stringify(state.bracket));
            const currentMatch = nextBracket[round][matchIndex];

            // Don't advance if the team is not set
            if (!currentMatch.t1 || !currentMatch.t2) return;

            nextBracket[round][matchIndex].winner = teamId;
            const roundIdx = ROUNDS.indexOf(round);

            if (roundIdx >= 0 && roundIdx < ROUNDS.length - 1) {
                let nextRound = ROUNDS[roundIdx + 1];
                const nextMatchIndex = Math.floor(matchIndex / 2);
                const isT1 = matchIndex % 2 === 0;
                const nextMatch = nextBracket[nextRound][nextMatchIndex];

                if (isT1) {
                    if (nextMatch.t1 !== teamId) {
                        nextMatch.t1 = teamId;
                        if (nextMatch.winner) clearDownstream(nextBracket, nextRound, nextMatchIndex);
                    }
                } else {
                    if (nextMatch.t2 !== teamId) {
                        nextMatch.t2 = teamId;
                        if (nextMatch.winner) clearDownstream(nextBracket, nextRound, nextMatchIndex);
                    }
                }
            }

            // Special handling for Semi-Finals to populate Bronze match
            if (round === 'sf') {
                const sf1 = nextBracket.sf[0];
                const sf2 = nextBracket.sf[1];
                if (sf1.winner && sf2.winner) {
                    const loser1 = sf1.winner === sf1.t1 ? sf1.t2 : sf1.t1;
                    const loser2 = sf2.winner === sf2.t1 ? sf2.t2 : sf2.t1;
                    nextBracket.bronze[0] = { t1: loser1, t2: loser2, winner: null };
                } else {
                    // If a SF winner is un-picked, clear the bronze match
                    nextBracket.bronze[0] = { t1: null, t2: null, winner: null };
                }
            }

            setState({ bracket: nextBracket });
        };

        // Render Sub-components
        const renderTeamRow = (team, isWinner, roundId, matchIndex) => {
            const bgClass = isWinner ? 'bg-blue-600/20' : 'hover:bg-slate-700/50';
            const textClass = isWinner ? 'text-white font-bold' : 'text-slate-300 font-medium';
            const indicator = isWinner ? `<div class="w-1 h-full bg-blue-500 absolute left-0 top-0"></div>` : '';

            if (team) {
                return `
                    <div class="relative flex items-center px-4 h-12 cursor-pointer transition-colors ${bgClass}" onclick="window.advanceWinner('${roundId}', ${matchIndex}, '${team.code.toUpperCase()}')">
                        ${indicator}
                        <img src="https://flagcdn.com/w40/${team.code}.png" class="w-6 h-4 mr-3 rounded shadow-sm object-cover" alt="flag" />
                        <span class="flex-1 text-sm truncate ${textClass}">${team.name}</span>
                    </div>`;
            } else {
                return `
                    <div class="relative flex items-center px-4 h-12 bg-slate-800/50">
                        <span class="flex-1 text-sm font-medium text-slate-500">TBD</span>
                    </div>`;
            }
        };

        // New compact match card for the new layout
        const renderNewMatchCard = (match, roundId, matchIndex) => {
            const t1 = match.t1 ? TEAMS[match.t1.toUpperCase()] : null;
            const t2 = match.t2 ? TEAMS[match.t2.toUpperCase()] : null;
            const borderClass = match.winner ? 'border-blue-500/50 shadow-glow-blue' : 'border-slate-700/50';

            return `
                <div class="flex-1 flex flex-col justify-center py-2 relative w-full group">
                    <div class="w-full bg-slate-800/80 backdrop-blur-sm border ${borderClass} rounded-lg overflow-hidden transition-all">
                        ${renderTeamRow(t1, match.winner === match.t1, roundId, matchIndex)}
                        <div class="h-px bg-slate-700/50 w-full"></div>
                        ${renderTeamRow(t2, match.winner === match.t2, roundId, matchIndex)}
                    </div>
                </div>`;
        };

        // Render a vertical column of matches
        const renderVerticalMatchColumn = (roundId, matchArray, startIndex, count) => {
            const matchesHtml = matchArray.slice(startIndex, startIndex + count).map((m, i) => renderNewMatchCard(m, roundId, startIndex + i)).join('');
            return `<div class="flex flex-col shrink-0 w-52 px-1" style="height: 100%;">${matchesHtml}</div>`;
        };

        // Render connectors
        const renderConnector = (type, count) => {
            let forksHtml = '';
            for (let i = 0; i < count; i++) {
                // min-height added to prevent empty flex item collapsing in Safari
                forksHtml += `
                    <div class="flex-1 relative w-full group" style="min-height: 1px;">
                        <div class="absolute top-[25%] bottom-[25%] w-1/2 bracket-line-${type === 'right' ? 'r' : 'l'} bracket-line-t bracket-line-b transition-colors ${type === 'right' ? 'left-0 rounded-r-xl' : 'right-0 rounded-l-xl'}"></div>
                        <div class="absolute top-1/2 w-1/2 bracket-line-t transition-colors ${type === 'right' ? 'right-0' : 'left-0'}"></div>
                    </div>`;
            }
            return `<div class="w-6 flex flex-col shrink-0" style="height: 100%;">${forksHtml}</div>`;
        }

        const renderCenterStage = () => {
            const finalMatch = state.bracket.final[0];
            const bronzeMatch = state.bracket.bronze[0];

            const winner = finalMatch.winner ? TEAMS[finalMatch.winner.toUpperCase()] : null;
            const bronzeWinner = bronzeMatch.winner ? TEAMS[bronzeMatch.winner.toUpperCase()] : null;

            let championHtml = '';
            if (winner) {
                championHtml = `
                    <div class="flex flex-col items-center justify-center mb-8 z-10">
                        <div class="bg-gradient-to-b from-slate-900 to-slate-950 border border-yellow-500/30 rounded-2xl p-6 text-center shadow-glow-yellow relative overflow-hidden w-64">
                            <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-500/10 to-transparent"></div>
                            <h2 class="text-xs font-bold mb-2 tracking-[0.3em] text-yellow-400 uppercase relative z-10">World Champions</h2>
                            <img src="https://flagcdn.com/w160/${winner.code}.png" class="w-28 h-20 mx-auto mb-4 rounded-lg shadow-md border-2 border-yellow-500/40 object-cover relative z-10" alt="Champion Flag" />
                            <h1 class="text-2xl font-black text-white relative z-10">${winner.name}</h1>
                        </div>
                    </div>`;
            } else {
                championHtml = `<h2 class="text-2xl font-black text-slate-500 uppercase tracking-[0.2em] text-center mb-8">World Champions</h2>`
            }

            const trophyHtml = `
                <div class="flex justify-center items-center my-6 z-10">
                     <!-- Placeholder for Trophy Image - Using a large emoji for now -->
                    <div class="text-[10rem] drop-shadow-[0_0_30px_rgba(234,179,8,0.4)]">🏆</div>
                </div>
            `;

            const finalMatchHtml = renderNewMatchCard(finalMatch, 'final', 0);

            let bronzeHtml = '';
            if (bronzeWinner) {
                bronzeHtml = `
                    <div class="flex flex-col items-center justify-center mt-8 z-10">
                        <div class="bg-slate-900/80 border border-orange-700/30 rounded-xl p-4 text-center shadow-lg relative overflow-hidden w-52">
                             <h2 class="text-[0.6rem] font-bold mb-2 tracking-[0.2em] text-orange-400 uppercase relative z-10">Bronze Winner</h2>
                             <div class="flex items-center justify-center space-x-3">
                                <img src="https://flagcdn.com/w40/${bronzeWinner.code}.png" class="w-8 h-6 rounded shadow-sm border border-orange-700/40 object-cover relative z-10" alt="Bronze Flag" />
                                <h1 class="text-lg font-bold text-white relative z-10">${bronzeWinner.name}</h1>
                             </div>
                        </div>
                    </div>`;
            }

            const bronzeMatchHtml = renderNewMatchCard(bronzeMatch, 'bronze', 0);

            return `
                <div class="flex flex-col shrink-0 w-80 px-4 justify-center relative" style="height: 100%;">
                    <!-- Connecting lines for final -->
                    <div class="absolute top-1/2 left-0 w-4 bracket-line-t"></div>
                    <div class="absolute top-1/2 right-0 w-4 bracket-line-t"></div>

                    ${championHtml}
                    <div class="w-64 mx-auto">${finalMatchHtml}</div>
                    ${trophyHtml}
                    <div class="w-64 mx-auto">${bronzeMatchHtml}</div>
                    <h2 class="text-xs font-bold mt-4 mb-2 tracking-[0.2em] text-orange-400 uppercase text-center">Bronze Match</h2>
                    ${bronzeHtml}
                </div>`;
        }

        // Main Render Cycle
        function renderApp() {
            const headerActions = document.getElementById('header-actions');
            const container = document.getElementById('app-container');

            // Snapshot Scroll state before re-rendering DOM
            let winScrollY = window.scrollY;
            let bracketScrollX = 0;
            let bracketScrollY = 0;

            const existingScroll = document.getElementById('bracket-scroll-container');
            if (existingScroll) {
                bracketScrollX = existingScroll.scrollLeft;
                bracketScrollY = existingScroll.scrollTop;
            }

            if (state.stage !== 'groups') {
                headerActions.innerHTML = `
                    <button onclick="window.handleReset()" class="text-xs px-4 py-1.5 rounded-md transition-all font-bold border ${state.resetConfirm ? 'bg-red-600 border-red-500 text-white animate-pulse' : 'bg-slate-800/50 text-slate-300 border-slate-700/50 hover:bg-slate-700/50'}">
                        ${state.resetConfirm ? "Sure?" : "Reset"}
                    </button>`;
            } else {
                headerActions.innerHTML = '';
            }

            if (state.stage === 'groups') {
                const isGroupsComplete = Object.keys(GROUPS).every(g => (state.groupSelections[g] || []).length === 2);
                let groupsHtml = `
                    <div class="p-4 max-w-md mx-auto">
                        <h2 class="text-2xl font-black mt-2 mb-1 text-center bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-300 tracking-tight">Group Stage</h2>
                        <p class="text-slate-400 text-center mb-6 text-sm font-medium">Select the 1st and 2nd place teams</p>
                `;

                for (const g in GROUPS) {
                    const selectionCount = (state.groupSelections[g] || []).length;
                    groupsHtml += `
                        <div class="bg-slate-800/60 p-3 rounded-2xl border border-slate-700/80 mb-4 shadow-sm backdrop-blur-sm">
                            <div class="flex items-center justify-between mb-3 border-b border-slate-700/80 pb-2 px-1">
                                <h3 class="text-lg font-bold text-slate-200">Group ${g}</h3>
                                <span class="text-xs text-slate-400 font-bold bg-slate-900/50 px-2 py-1 rounded">${selectionCount}/2 Selected</span>
                            </div>
                            <div class="flex flex-col space-y-1.5">
                    `;
                    GROUPS[g].forEach(teamId => {
                        const team = TEAMS[teamId];
                        const selectedIdx = (state.groupSelections[g] || []).indexOf(teamId);
                        const isSelected = selectedIdx !== -1;
                        const bgClass = isSelected ? (selectedIdx === 0 ? 'bg-blue-600/20 border-blue-500/50 text-white' : 'bg-cyan-600/20 border-cyan-500/50 text-white') : 'bg-slate-800/80 border-slate-700/50 text-slate-300 hover:bg-slate-700/80';

                        groupsHtml += `
                            <div class="flex items-center p-3 rounded-xl border cursor-pointer transition-all ${bgClass}" onclick="window.handleGroupTeamClick('${g}', '${teamId}')">
                                <img src="https://flagcdn.com/w40/${team.code}.png" class="w-7 h-4.5 mr-3 object-cover rounded shadow-sm" alt="flag" />
                                <span class="flex-1 font-semibold text-sm">${team.name}</span>
                                ${isSelected ? `<span class="w-6 h-6 flex items-center justify-center bg-white text-slate-900 font-bold rounded-full text-xs shadow">${selectedIdx + 1}</span>` : ''}
                            </div>
                        `;
                    });
                    groupsHtml += `</div></div>`;
                }

                if (isGroupsComplete) {
                    groupsHtml += `
                        <div class="mt-8 mb-6">
                            <button onclick="window.proceedToThirds()" class="w-full flex justify-center items-center bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-xl shadow-glow-blue transition-all">
                                Continue to Wildcards <span class="ml-2">➡️</span>
                            </button>
                        </div>
                    `;
                }
                groupsHtml += `</div>`;
                container.innerHTML = groupsHtml;
            }

            else if (state.stage === 'thirds') {
                const totalSelected = state.thirdPlaces.length;
                let thirdsHtml = `
                    <div class="p-4 max-w-md mx-auto">
                        <h2 class="text-2xl font-black mt-2 mb-1 text-center text-purple-400 tracking-tight">Wildcards</h2>
                        <p class="text-slate-400 text-center mb-6 text-sm font-medium">Select EXACTLY 8 third-placed teams</p>
                        
                        <div class="flex justify-between items-center mb-6 bg-slate-800/80 p-4 rounded-2xl border border-slate-700/80 shadow-sm backdrop-blur-sm">
                             <span class="font-bold text-slate-300">Selected:</span>
                             <span class="font-black text-2xl ${totalSelected === 8 ? 'text-green-400' : 'text-purple-400'}">
                                 ${totalSelected} <span class="text-slate-500 text-lg">/ 8</span>
                             </span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-6">
                `;

                const availableThirds = Object.keys(GROUPS).flatMap(g => {
                    const selected = state.groupSelections[g] || [];
                    return GROUPS[g].filter(t => !selected.includes(t));
                });

                availableThirds.forEach(teamId => {
                    const team = TEAMS[teamId];
                    const isSelected = state.thirdPlaces.includes(teamId);
                    const cls = isSelected ? 'border-purple-500/60 bg-purple-600/20 text-white' : 'border-slate-700/50 bg-slate-800/80 text-slate-300 hover:bg-slate-700/80';

                    thirdsHtml += `
                        <div onclick="window.handleThirdPlaceClick('${teamId}')" class="flex items-center p-3 rounded-xl border cursor-pointer transition-all ${cls}">
                            <img src="https://flagcdn.com/w40/${team.code}.png" class="w-6 h-4 mr-3 object-cover rounded shadow-sm" alt="flag" />
                            <span class="font-medium text-sm truncate">${team.name}</span>
                        </div>
                    `;
                });

                thirdsHtml += `</div>
                    <div class="mt-8 mb-6">
                        <button ${totalSelected !== 8 ? 'disabled' : ''} onclick="window.generateBracket()" class="w-full flex justify-center items-center font-bold py-4 rounded-xl transition-all ${totalSelected === 8 ? 'bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white shadow-[0_0_15px_rgba(22,163,74,0.3)]' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}">
                            Generate Bracket <span class="ml-2">🚀</span>
                        </button>
                    </div>
                </div>`;

                container.innerHTML = thirdsHtml;
            }

            else if (state.stage === 'knockout' && state.bracket) {
                // Fixed Explicit Height ensures Safari doesn't collapse the empty flex elements
                container.innerHTML = `
                    <div class="p-4 w-full h-full flex flex-col">
                        <div class="text-center mb-4 flex-shrink-0">
                            <h2 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-300 tracking-tight uppercase">Knockout Stage</h2>
                        </div>
                        <div id="bracket-scroll-container" class="relative w-full flex-grow bg-slate-950/50 border border-slate-800/50 rounded-3xl p-4 overflow-auto custom-scrollbar shadow-2xl backdrop-blur-md">
                            <div class="flex min-w-max items-stretch justify-center" style="height: 1300px;">
                                <!-- Left Bracket -->
                                ${renderVerticalMatchColumn('r32', state.bracket.r32, 0, 8)}
                                ${renderConnector('right', 4)}
                                ${renderVerticalMatchColumn('r16', state.bracket.r16, 0, 4)}
                                ${renderConnector('right', 2)}
                                ${renderVerticalMatchColumn('qf', state.bracket.qf, 0, 2)}
                                ${renderConnector('right', 1)}
                                ${renderVerticalMatchColumn('sf', state.bracket.sf, 0, 1)}
                                
                                <!-- Center Stage -->
                                ${renderCenterStage()}

                                <!-- Right Bracket -->
                                ${renderVerticalMatchColumn('sf', state.bracket.sf, 1, 1)}
                                ${renderConnector('left', 1)}
                                ${renderVerticalMatchColumn('qf', state.bracket.qf, 2, 2)}
                                ${renderConnector('left', 2)}
                                ${renderVerticalMatchColumn('r16', state.bracket.r16, 4, 4)}
                                ${renderConnector('left', 4)}
                                ${renderVerticalMatchColumn('r32', state.bracket.r32, 8, 8)}
                            </div>
                        </div>
                    </div>
                `;
            }

            // Restore Scroll perfectly using animation frame to ensure DOM is fully repainted first
            requestAnimationFrame(() => {
                if (intentionalScrollReset) {
                    window.scrollTo(0, 0);
                    const newScroll = document.getElementById('bracket-scroll-container');
                    if (newScroll) {
                        // Center the view horizontally
                        newScroll.scrollLeft = (newScroll.scrollWidth - newScroll.clientWidth) / 2;
                        newScroll.scrollTop = 0;
                    }
                    intentionalScrollReset = false;
                } else {
                    window.scrollTo(0, winScrollY);
                    const newScroll = document.getElementById('bracket-scroll-container');
                    if (newScroll) {
                        newScroll.scrollLeft = bracketScrollX;
                        newScroll.scrollTop = bracketScrollY;
                    }
                }
            });
        }

        initApp();
    </script>
</body>

</html>
