<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#172033', 950: '#020617' },
                    },
                    boxShadow: {
                        'glow-blue': '0 0 15px -3px rgba(59, 130, 246, 0.5)',
                        'glow-yellow': '0 0 20px -3px rgba(234, 179, 8, 0.6)',
                    }
                }
            }
        }
    </script>
    <style>
        /* Modern Clean Scrollbars */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        body {
            background-color: #020617;
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }

        @media print {
            @page {
                size: landscape;
                margin: 0;
            }

            body {
                background-color: white !important;
                color: black !important;
                overflow: visible !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            #app-container {
                display: none !important;
            }

            #print-container {
                display: flex !important;
                min-height: 100vh;
                align-items: center;
                justify-content: center;
            }
        }

        @media screen {
            #print-container {
                display: none !important;
            }
        }
    </style>
</head>

<body class="selection:bg-blue-500 selection:text-white antialiased bg-slate-950">

    <!-- Main Content Container -->
    <main id="app-container" class="min-h-[100dvh] h-[100dvh] w-full flex flex-col">
        <div class="flex items-center justify-center h-full">
            <div class="animate-spin text-5xl">⚽</div>
        </div>
    </main>

    <!-- Print Container -->
    <div id="print-container"></div>

    <!-- App Logic -->
    <script>
        const STORAGE_KEY = 'fifa-world-cup-2026-data-v9';

        // Tournament Data
        const TEAMS = {
            "MX": { name: "Mexico", code: "mx" }, "ZA": { name: "South Africa", code: "za" }, "KR": { name: "South Korea", code: "kr" }, "CZ": { name: "Czechia", code: "cz" },
            "CA": { name: "Canada", code: "ca" }, "BA": { name: "Bosnia & Herz.", code: "ba" }, "QA": { name: "Qatar", code: "qa" }, "CH": { name: "Switzerland", code: "ch" },
            "BR": { name: "Brazil", code: "br" }, "MA": { name: "Morocco", code: "ma" }, "HT": { name: "Haiti", code: "ht" }, "GB-SCT": { name: "Scotland", code: "gb-sct" },
            "US": { name: "United States", code: "us" }, "PY": { name: "Paraguay", code: "py" }, "AU": { name: "Australia", code: "au" }, "TR": { name: "Türkiye", code: "tr" },
            "DE": { name: "Germany", code: "de" }, "CW": { name: "Curaçao", code: "cw" }, "CI": { name: "Ivory Coast", code: "ci" }, "EC": { name: "Ecuador", code: "ec" },
            "NL": { name: "Netherlands", code: "nl" }, "JP": { name: "Japan", code: "jp" }, "SE": { name: "Sweden", code: "se" }, "TN": { name: "Tunisia", code: "tn" },
            "BE": { name: "Belgium", code: "be" }, "EG": { name: "Egypt", code: "eg" }, "IR": { name: "Iran", code: "ir" }, "NZ": { name: "New Zealand", code: "nz" },
            "ES": { name: "Spain", code: "es" }, "CV": { name: "Cabo Verde", code: "cv" }, "SA": { name: "Saudi Arabia", code: "sa" }, "UY": { name: "Uruguay", code: "uy" },
            "FR": { name: "France", code: "fr" }, "SN": { name: "Senegal", code: "sn" }, "IQ": { name: "Iraq", code: "iq" }, "NO": { name: "Norway", code: "no" },
            "AR": { name: "Argentina", code: "ar" }, "DZ": { name: "Algeria", code: "dz" }, "AT": { name: "Austria", code: "at" }, "JO": { name: "Jordan", code: "jo" },
            "PT": { name: "Portugal", code: "pt" }, "CD": { name: "DR Congo", code: "cd" }, "UZ": { name: "Uzbekistan", code: "uz" }, "CO": { name: "Colombia", code: "co" },
            "GB-ENG": { name: "England", code: "gb-eng" }, "HR": { name: "Croatia", code: "hr" }, "GH": { name: "Ghana", code: "gh" }, "PA": { name: "Panama", code: "pa" }
        };

        const GROUPS = {
            A: ["MX", "ZA", "KR", "CZ"], B: ["CA", "BA", "QA", "CH"], C: ["BR", "MA", "HT", "GB-SCT"], D: ["US", "PY", "AU", "TR"],
            E: ["DE", "CW", "CI", "EC"], F: ["NL", "JP", "SE", "TN"], G: ["BE", "EG", "IR", "NZ"], H: ["ES", "CV", "SA", "UY"],
            I: ["FR", "SN", "IQ", "NO"], J: ["AR", "DZ", "AT", "JO"], K: ["PT", "CD", "UZ", "CO"], L: ["GB-ENG", "HR", "GH", "PA"]
        };

        const ROUNDS = ['r32', 'r16', 'qf', 'sf', 'final'];
        window.ROUND_HEIGHTS = { 'r32': 1800, 'r16': 950, 'qf': 750, 'sf': 750, 'final': 750 };

        // App State & Memory
        let state = {
            stage: 'groups',
            groupSelections: {},
            bracket: null,
            pickingThird: null // { matchIndex: 0 }
        };

        let saveTimeout = null;
        let currentActiveTab = 'r32';
        let groupScrollMemY = 0;
        let bracketScrollMemX = 0;
        let colScrollMemY = {};
        let intentionalScrollReset = false;

        // Utilities
        function saveStateToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    stage: state.stage,
                    groupSelections: state.groupSelections,
                    bracket: state.bracket,
                    currentActiveTab
                }));
            } catch (e) { console.error("Save failed", e); }
        }

        function setState(newState) {
            state = { ...state, ...newState };
            renderApp();
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveStateToStorage, 300);
        }

        function initApp() {
            try {
                const savedData = localStorage.getItem(STORAGE_KEY);
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    state.groupSelections = parsed.groupSelections || {};
                    state.bracket = parsed.bracket || null;
                    state.stage = parsed.stage || 'groups';
                    currentActiveTab = parsed.currentActiveTab || 'r32';
                }
            } catch (e) { console.error("Load failed", e); }
            renderApp();
        }

        // Event Actions
        window.handleGroupTeamClick = (groupName, teamId) => {
            const current = state.groupSelections[groupName] || [];
            let newSelection;
            if (current.includes(teamId)) {
                newSelection = current.filter(t => t !== teamId);
            } else if (current.length < 3) {
                newSelection = [...current, teamId];
            } else return;

            setState({ groupSelections: { ...state.groupSelections, [groupName]: newSelection } });
        };

        window.generateBracket = () => {
            intentionalScrollReset = true;
            currentActiveTab = 'r32';
            bracketScrollMemX = 0;
            colScrollMemY = {};

            const get1st = (g) => state.groupSelections[g]?.[0];
            const get2nd = (g) => state.groupSelections[g]?.[1];

            // OFFICIAL 2026 FIFA WORLD CUP BRACKET FIXTURE MAPPING
            const r32 = [
                // Left Side of Bracket (Matches 1-8)
                { t1: get1st('E'), t2: null, isThird: true, label: '3rd ABCDF', winner: null },
                { t1: get1st('I'), t2: null, isThird: true, label: '3rd CDFGH', winner: null },
                { t1: get2nd('A'), t2: get2nd('B'), winner: null },
                { t1: get1st('F'), t2: get2nd('C'), winner: null },
                { t1: get2nd('K'), t2: get2nd('L'), winner: null },
                { t1: get1st('H'), t2: get2nd('J'), winner: null },
                { t1: get1st('D'), t2: null, isThird: true, label: '3rd BEFIJ', winner: null },
                { t1: get1st('G'), t2: null, isThird: true, label: '3rd AEHIJ', winner: null },

                // Right Side of Bracket (Matches 9-16)
                { t1: get1st('C'), t2: get2nd('F'), winner: null },
                { t1: get2nd('E'), t2: get2nd('I'), winner: null },
                { t1: get1st('A'), t2: null, isThird: true, label: '3rd CEFHI', winner: null },
                { t1: get1st('L'), t2: null, isThird: true, label: '3rd EHIJK', winner: null },
                { t1: get1st('J'), t2: get2nd('H'), winner: null },
                { t1: get2nd('D'), t2: get2nd('G'), winner: null },
                { t1: get1st('B'), t2: null, isThird: true, label: '3rd EFGIJ', winner: null },
                { t1: get1st('K'), t2: null, isThird: true, label: '3rd DEIJL', winner: null }
            ];

            const bracket = {
                r32: r32,
                r16: Array.from({ length: 8 }, () => ({ t1: null, t2: null, winner: null })),
                qf: Array.from({ length: 4 }, () => ({ t1: null, t2: null, winner: null })),
                sf: Array.from({ length: 2 }, () => ({ t1: null, t2: null, winner: null })),
                final: Array.from({ length: 1 }, () => ({ t1: null, t2: null, winner: null })),
                bronze: Array.from({ length: 1 }, () => ({ t1: null, t2: null, winner: null }))
            };

            setState({ bracket, stage: 'knockout' });
        };

        const clearDownstream = (bracketMut, fromRound, matchIndex) => {
            const startIdx = ROUNDS.indexOf(fromRound);
            let currIdx = matchIndex;

            for (let i = startIdx; i < ROUNDS.length; i++) {
                const r = ROUNDS[i];
                bracketMut[r][currIdx].winner = null;

                if (r === 'final') bracketMut.final[0].winner = null;
                if (r === 'sf') bracketMut.bronze[0] = { t1: null, t2: null, winner: null };

                if (i < ROUNDS.length - 1) {
                    const nextR = ROUNDS[i + 1];
                    const nextIdx = Math.floor(currIdx / 2);
                    if (currIdx % 2 === 0) bracketMut[nextR][nextIdx].t1 = null;
                    else bracketMut[nextR][nextIdx].t2 = null;
                    currIdx = nextIdx;
                }
            }
        };

        // Third Place Modal Logic
        window.openThirdSelector = (matchIndex) => {
            setState({ pickingThird: { matchIndex } });
        };

        window.closeThirdSelector = () => {
            setState({ pickingThird: null });
        };

        window.selectThird = (matchIndex, teamId) => {
            const nextBracket = structuredClone(state.bracket);
            const match = nextBracket.r32[matchIndex];

            if (match.t2 !== teamId) {
                match.t2 = teamId;
                if (match.winner) {
                    match.winner = null;
                    clearDownstream(nextBracket, 'r32', matchIndex);
                }
            }
            setState({ bracket: nextBracket, pickingThird: null });
        };

        window.triggerPrint = () => {
            const printContainer = document.getElementById('print-container');

            const renderPrintRow = (t, isWinner, isT1, match, roundId) => {
                let rankHtml = '';
                if (roundId === 'r32' && t) {
                    let rankNum = '';
                    let groupLetter = '';
                    for (const g in state.groupSelections) {
                        const idx = (state.groupSelections[g] || []).indexOf(t.code.toUpperCase());
                        if (idx === 0) { rankNum = '1'; groupLetter = g; }
                        else if (idx === 1) { rankNum = '2'; groupLetter = g; }
                        else if (idx === 2) { rankNum = '3'; groupLetter = g; }
                    }
                    if (rankNum) {
                        rankHtml = `<span class="ml-1 shrink-0 text-[7px] font-bold text-gray-500 bg-gray-100 px-1 py-0.5 rounded border border-gray-200 leading-none">${rankNum}${groupLetter}</span>`;
                    }
                }

                return `
                    <div class="flex items-center px-1.5 py-0.5 ${isWinner ? 'bg-gray-200 font-bold text-black' : 'text-gray-700'} text-[9px] leading-normal" style="height: 20px;">
                        ${t ? `
                            <img src="https://flagcdn.com/w20/${t.code}.png" class="w-3.5 h-2.5 mr-1 border border-gray-300 shrink-0" style="object-fit: cover;" /> 
                            <div class="flex-1 flex items-center min-w-0">
                                <span class="truncate pb-[1px]">${t.name}</span>
                                ${rankHtml}
                            </div>
                        ` : `<span class="text-gray-400 pb-[1px] font-medium">${(!isT1 && match && match.isThird) ? match.label : 'TBD'}</span>`}
                    </div>
                `;
            };

            const renderPrintCard = (match, roundId) => {
                const t1 = match.t1 ? TEAMS[match.t1.toUpperCase()] : null;
                const t2 = match.t2 ? TEAMS[match.t2.toUpperCase()] : null;
                return `
                    <div class="border border-gray-400 rounded bg-white overflow-hidden shadow-sm mx-auto" style="width: 95px;">
                        ${renderPrintRow(t1, match.winner === match.t1, true, match, roundId)}
                        <div class="h-px bg-gray-300 w-full"></div>
                        ${renderPrintRow(t2, match.winner === match.t2, false, match, roundId)}
                    </div>
                `;
            };

            const renderPrintCol = (matches, isLeft, roundId) => {
                const html = matches.map(m => `
                    <div class="flex-1 flex flex-col justify-center relative z-10 w-full">
                        ${renderPrintCard(m, roundId)}
                    </div>
                `).join('');
                return `<div class="flex flex-col shrink-0 h-full w-[100px]">${html}</div>`;
            };

            const renderPrintConnectors = (count, isLeft, isStraight = false) => {
                let html = '';
                for (let i = 0; i < count; i++) {
                    if (isStraight) {
                        html += `
                            <div class="flex-1 relative w-full min-h-0">
                                <div class="absolute top-1/2 w-full border-t-[1.5px] border-gray-400"></div>
                            </div>`;
                    } else if (isLeft) {
                        html += `
                            <div class="flex-1 relative w-full min-h-0">
                                <div class="absolute top-[25%] bottom-[25%] w-1/2 border-r-[1.5px] border-t-[1.5px] border-b-[1.5px] border-gray-400 left-0 rounded-r border-solid"></div>
                                <div class="absolute top-1/2 w-1/2 border-t-[1.5px] border-gray-400 right-0 border-solid"></div>
                            </div>`;
                    } else {
                        html += `
                            <div class="flex-1 relative w-full min-h-0">
                                <div class="absolute top-[25%] bottom-[25%] w-1/2 border-l-[1.5px] border-t-[1.5px] border-b-[1.5px] border-gray-400 right-0 rounded-l border-solid"></div>
                                <div class="absolute top-1/2 w-1/2 border-t-[1.5px] border-gray-400 left-0 border-solid"></div>
                            </div>`;
                    }
                }
                return `<div class="w-4 flex flex-col shrink-0 h-full">${html}</div>`;
            };

            const r32L = state.bracket.r32.slice(0, 8);
            const r32R = state.bracket.r32.slice(8, 16);
            const r16L = state.bracket.r16.slice(0, 4);
            const r16R = state.bracket.r16.slice(4, 8);
            const qfL = state.bracket.qf.slice(0, 2);
            const qfR = state.bracket.qf.slice(2, 4);
            const sfL = state.bracket.sf.slice(0, 1);
            const sfR = state.bracket.sf.slice(1, 2);

            const finalMatch = state.bracket.final[0];
            const bronzeMatch = state.bracket.bronze[0];
            const winner = finalMatch.winner ? TEAMS[finalMatch.winner.toUpperCase()] : null;

            const centerHtml = `
                <div class="w-36 flex flex-col items-center justify-center shrink-0 h-full px-2 relative z-10">
                    <div class="absolute w-full flex flex-col items-center" style="top: 8%;">
                        <h3 class="text-[12px] font-black text-gray-500 uppercase tracking-widest mb-1">World Champion</h3>
                        ${winner ? `
                            <img src="https://flagcdn.com/w80/${winner.code}.png" class="w-16 h-10 mx-auto border border-gray-400 rounded shadow-sm mb-1 object-cover" />
                            <span class="font-black text-xs uppercase text-gray-900">${winner.name}</span>
                        ` : `
                            <div class="w-16 h-10 mx-auto border border-gray-400 rounded shadow-inner mb-1 bg-gray-100 flex items-center justify-center text-xl">🏆</div>
                        `}
                    </div>
                    
                    <div class="flex flex-col items-center justify-center w-full flex-1 relative">
                        ${renderPrintCard(finalMatch, 'final')}
                    </div>
                    
                    <div class="absolute w-full flex flex-col items-center" style="bottom: 8%;">
                        <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-1">Bronze Match</h3>
                        ${renderPrintCard(bronzeMatch, 'bronze')}
                    </div>
                </div>
            `;

            printContainer.innerHTML = `
                <div class="w-full flex flex-col p-6 bg-white text-black font-sans box-border mx-auto" style="width: 297mm; height: 200mm;">
                    <div class="flex-grow flex items-stretch justify-center w-full pt-4">
                        ${renderPrintCol(r32L, true, 'r32')}
                        ${renderPrintConnectors(4, true)}
                        ${renderPrintCol(r16L, true, 'r16')}
                        ${renderPrintConnectors(2, true)}
                        ${renderPrintCol(qfL, true, 'qf')}
                        ${renderPrintConnectors(1, true)}
                        ${renderPrintCol(sfL, true, 'sf')}
                        ${renderPrintConnectors(1, true, true)}
                        
                        ${centerHtml}

                        ${renderPrintConnectors(1, false, true)}
                        ${renderPrintCol(sfR, false, 'sf')}
                        ${renderPrintConnectors(1, false)}
                        ${renderPrintCol(qfR, false, 'qf')}
                        ${renderPrintConnectors(2, false)}
                        ${renderPrintCol(r16R, false, 'r16')}
                        ${renderPrintConnectors(4, false)}
                        ${renderPrintCol(r32R, false, 'r32')}
                    </div>
                </div>
            `;

            setTimeout(() => window.print(), 100);
        };

        window.triggerConfetti = () => {
            const duration = 4000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 99999 };
            const randomInRange = (min, max) => Math.random() * (max - min) + min;

            const interval = setInterval(() => {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                const particleCount = 50 * (timeLeft / duration);
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
            }, 250);
        };

        window.advanceWinner = (round, matchIndex, teamId) => {
            const nextBracket = structuredClone(state.bracket);
            const currentMatch = nextBracket[round][matchIndex];
            const oldWinner = state.bracket[round][matchIndex].winner;

            if (!currentMatch.t1 || !currentMatch.t2) return;

            nextBracket[round][matchIndex].winner = teamId;
            const roundIdx = ROUNDS.indexOf(round);

            if (roundIdx >= 0 && roundIdx < ROUNDS.length - 1) {
                const nextRound = ROUNDS[roundIdx + 1];
                const nextMatchIndex = Math.floor(matchIndex / 2);
                const isT1 = matchIndex % 2 === 0;
                const nextMatch = nextBracket[nextRound][nextMatchIndex];

                if (isT1) {
                    if (nextMatch.t1 !== teamId) {
                        nextMatch.t1 = teamId;
                        if (nextMatch.winner) clearDownstream(nextBracket, nextRound, nextMatchIndex);
                    }
                } else {
                    if (nextMatch.t2 !== teamId) {
                        nextMatch.t2 = teamId;
                        if (nextMatch.winner) clearDownstream(nextBracket, nextRound, nextMatchIndex);
                    }
                }
            }

            if (round === 'sf') {
                const sf1 = nextBracket.sf[0];
                const sf2 = nextBracket.sf[1];
                if (sf1.winner && sf2.winner) {
                    const loser1 = sf1.winner === sf1.t1 ? sf1.t2 : sf1.t1;
                    const loser2 = sf2.winner === sf2.t1 ? sf2.t2 : sf2.t1;
                    nextBracket.bronze[0] = { t1: loser1, t2: loser2, winner: null };
                } else {
                    nextBracket.bronze[0] = { t1: null, t2: null, winner: null };
                }
            }

            if (round === 'final' && oldWinner !== teamId) {
                setTimeout(window.triggerConfetti, 100);
            }

            setState({ bracket: nextBracket });
        };

        window.updateBracketHeight = (roundId) => {
            const wrapper = document.getElementById('bracket-tree-wrapper');
            if (wrapper) {
                const targetHeight = window.ROUND_HEIGHTS[roundId] || 1800;
                wrapper.style.height = `${targetHeight}px`;
            }
        };

        function setupCarouselTracking() {
            const carousel = document.getElementById('bracket-scroll-container');
            if (!carousel) return;

            let isScrolling;
            carousel.addEventListener('scroll', () => {
                window.clearTimeout(isScrolling);
                isScrolling = setTimeout(() => {
                    let closestRound = ROUNDS[0];
                    let minDiff = Infinity;
                    const carouselCenter = carousel.scrollLeft + (carousel.clientWidth / 2);

                    ROUNDS.forEach(r => {
                        const col = document.getElementById(`col-${r}`);
                        if (col) {
                            const colCenter = col.offsetLeft + (col.clientWidth / 2);
                            const diff = Math.abs(colCenter - carouselCenter);
                            if (diff < minDiff) {
                                minDiff = diff;
                                closestRound = r;
                            }
                        }
                    });

                    if (currentActiveTab !== closestRound) {
                        currentActiveTab = closestRound;

                        window.updateBracketHeight(closestRound);

                        // Ensure vertical scroll smoothly resets to top when swapping rounds via horizontal swipe
                        carousel.scrollTo({ top: 0, behavior: 'smooth' });

                        clearTimeout(saveTimeout);
                        saveTimeout = setTimeout(saveStateToStorage, 300);
                    }
                }, 66); // Debounce to prevent heavy layout recalculations
            }, { passive: true });
        }

        const getRoundName = (id) => {
            const names = { 'r32': 'Round of 32', 'r16': 'Round of 16', 'qf': 'Quarter-Finals', 'sf': 'Semi-Finals', 'final': 'Final' };
            return names[id] || '';
        };

        // Render Sub-components
        const renderTeamRow = (team, isWinner, roundId, matchIndex, isT1, match) => {
            const bgClass = isWinner ? 'bg-blue-600/20' : 'hover:bg-slate-700/50';
            const textClass = isWinner ? 'text-white font-bold' : 'text-slate-300 font-medium';
            const indicator = isWinner ? `<div class="w-1 h-full bg-blue-500 absolute left-0 top-0"></div>` : '';

            let rankHtml = '';
            if (roundId === 'r32' && team) {
                let rankNum = '';
                let groupLetter = '';
                for (const g in state.groupSelections) {
                    const idx = (state.groupSelections[g] || []).indexOf(team.code.toUpperCase());
                    if (idx === 0) { rankNum = '1'; groupLetter = g; }
                    else if (idx === 1) { rankNum = '2'; groupLetter = g; }
                    else if (idx === 2) { rankNum = '3'; groupLetter = g; }
                }
                if (rankNum) {
                    rankHtml = `<span class="ml-2 shrink-0 text-[10px] font-bold text-slate-400 bg-slate-900/50 px-1.5 py-0.5 rounded border border-slate-700/50 leading-none">${rankNum}${groupLetter}</span>`;
                }
            }

            if (team) {
                // If it's a 3rd place slot that was already selected, add a tiny swap button so they can change their mind
                const swapBtn = (!isT1 && match.isThird && roundId === 'r32') ? `
                    <button onclick="event.stopPropagation(); window.openThirdSelector(${matchIndex})" class="w-8 h-8 flex shrink-0 items-center justify-center bg-slate-700/80 rounded-lg hover:bg-slate-600 text-sm ml-2 z-10 transition-colors shadow-sm border border-slate-600">🔄</button>
                ` : '';

                return `
                    <div class="relative flex items-center px-4 py-3 cursor-pointer transition-colors ${bgClass}" onclick="window.advanceWinner('${roundId}', ${matchIndex}, '${team.code.toUpperCase()}')">
                        ${indicator}
                        <img src="https://flagcdn.com/w40/${team.code}.png" class="w-7 h-5 mr-4 shrink-0 rounded shadow-sm object-cover" alt="flag" />
                        <div class="flex-1 flex items-center min-w-0">
                            <span class="text-[15px] truncate leading-normal pb-[1px] ${textClass}">${team.name}</span>
                            ${rankHtml}
                        </div>
                        ${swapBtn}
                    </div>`;
            }

            // Render Empty "Select 3rd Place" Button
            if (!isT1 && match.isThird && roundId === 'r32') {
                return `
                    <div class="relative flex items-center justify-center px-4 py-[14px] bg-blue-900/20 hover:bg-blue-800/30 border-t border-b border-blue-800/40 cursor-pointer transition-all border-dashed" onclick="window.openThirdSelector(${matchIndex})">
                        <span class="text-[13px] font-bold text-blue-400 uppercase tracking-widest">+ Select ${match.label}</span>
                    </div>`;
            }

            // Standard empty slot
            return `
                <div class="relative flex items-center px-4 py-3 bg-slate-800/50">
                    <span class="flex-1 text-[15px] font-medium text-slate-500 ml-11 leading-normal pb-[1px]">TBD</span>
                </div>`;
        };

        const renderNewMatchCard = (match, roundId, matchIndex) => {
            const t1 = match.t1 ? TEAMS[match.t1.toUpperCase()] : null;
            const t2 = match.t2 ? TEAMS[match.t2.toUpperCase()] : null;
            const borderClass = match.winner ? 'border-blue-500/50 shadow-glow-blue' : 'border-slate-700/50';

            return `
                <div class="w-full bg-slate-800/80 backdrop-blur-sm border ${borderClass} rounded-xl overflow-hidden transition-all shadow-md group">
                    ${renderTeamRow(t1, match.winner === match.t1, roundId, matchIndex, true, match)}
                    <div class="h-px bg-slate-700/50 w-full"></div>
                    ${renderTeamRow(t2, match.winner === match.t2, roundId, matchIndex, false, match)}
                </div>`;
        };

        const renderVerticalMatchColumn = (roundId, matchArray, count) => {
            const matchesHtml = matchArray.slice(0, count).map((m, i) => `
                <div class="w-full flex-1 flex flex-col justify-center py-2 relative">
                    ${renderNewMatchCard(m, roundId, i)}
                </div>
            `).join('');

            return `
                <div id="col-${roundId}" class="w-full shrink-0 snap-center h-full flex flex-col px-4 pt-8 pb-24 overflow-y-auto custom-scrollbar">
                    <h2 class="text-2xl font-black text-center text-slate-200 mb-6 tracking-tight">${getRoundName(roundId)}</h2>
                    <div class="w-full max-w-md mx-auto flex-grow flex flex-col">
                        ${matchesHtml}
                    </div>
                </div>`;
        };

        const renderFinalColumn = () => {
            const finalMatch = state.bracket.final[0];
            const bronzeMatch = state.bracket.bronze[0];

            const winner = finalMatch.winner ? TEAMS[finalMatch.winner.toUpperCase()] : null;
            const bronzeWinner = bronzeMatch.winner ? TEAMS[bronzeMatch.winner.toUpperCase()] : null;

            const championHtml = winner ? `
                <div class="w-full mb-8 z-10 flex-shrink-0">
                    <div class="bg-gradient-to-b from-slate-900 to-slate-950 border border-yellow-500/30 rounded-2xl p-6 text-center shadow-glow-yellow relative overflow-hidden w-full">
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-500/10 to-transparent"></div>
                        <h2 class="text-xs font-bold mb-2 tracking-[0.3em] text-yellow-400 uppercase relative z-10">World Champions</h2>
                        <img src="https://flagcdn.com/w160/${winner.code}.png" class="w-32 h-20 mx-auto mb-4 rounded-lg shadow-md border-2 border-yellow-500/40 object-cover relative z-10" alt="Champion Flag" />
                        <h1 class="text-2xl font-black text-white relative z-10">${winner.name}</h1>
                    </div>
                </div>` : `<h2 class="text-xl font-black text-slate-500 uppercase tracking-[0.2em] text-center w-full mb-8 flex-shrink-0">World Champions</h2>`;

            const bronzeHtml = bronzeWinner ? `
                <div class="w-full mt-8 z-10 flex-shrink-0">
                    <div class="bg-slate-900/80 border border-orange-700/30 rounded-xl p-4 text-center shadow-lg relative overflow-hidden w-full">
                         <h2 class="text-[0.65rem] font-bold mb-3 tracking-[0.2em] text-orange-400 uppercase relative z-10">Bronze Winner</h2>
                         <div class="flex items-center justify-center space-x-4">
                            <img src="https://flagcdn.com/w40/${bronzeWinner.code}.png" class="w-10 h-7 rounded shadow-sm border border-orange-700/40 object-cover relative z-10" alt="Bronze Flag" />
                            <h1 class="text-xl font-bold text-white relative z-10">${bronzeWinner.name}</h1>
                         </div>
                    </div>
                </div>` : '';

            return `
                <div id="col-final" class="w-full shrink-0 snap-center h-full flex flex-col px-4 pt-8 pb-24 overflow-y-auto custom-scrollbar">
                    <h2 class="text-2xl font-black text-center text-slate-200 mb-6 tracking-tight">Finals & 3rd Place</h2>
                    <div class="w-full max-w-md mx-auto flex flex-col items-center flex-grow">
                        ${championHtml}
                        <div class="w-full flex-1 flex flex-col justify-center py-2 relative">${renderNewMatchCard(finalMatch, 'final', 0)}</div>
                        <div class="flex justify-center items-center my-6 sm:my-8 z-10 flex-shrink-0">
                            <div class="text-[6rem] sm:text-[7rem] drop-shadow-[0_0_30px_rgba(234,179,8,0.4)] cursor-default select-none">🏆</div>
                        </div>
                        <div class="w-full flex-1 flex flex-col justify-center py-2 relative">${renderNewMatchCard(bronzeMatch, 'bronze', 0)}</div>
                        <h2 class="text-xs font-bold mt-8 tracking-[0.2em] text-orange-400 uppercase text-center w-full flex-shrink-0">Bronze Match</h2>
                        ${bronzeHtml}

                        <button onclick="window.triggerPrint()" class="mt-12 mb-8 flex items-center justify-center space-x-3 bg-slate-800 hover:bg-slate-700 text-white px-6 py-4 rounded-2xl border border-slate-600 transition-all w-full shadow-lg flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                            <span class="font-bold text-lg">Print Full Bracket</span>
                        </button>
                    </div>
                </div>`;
        }

        // Main Render Cycle
        function renderApp() {
            const container = document.getElementById('app-container');
            const groupScrollRef = document.getElementById('group-scroll-container');
            const bracketScrollRef = document.getElementById('bracket-scroll-container');

            // Save active scrolls before re-rendering
            if (groupScrollRef) groupScrollMemY = groupScrollRef.scrollTop;
            if (bracketScrollRef) {
                bracketScrollMemX = bracketScrollRef.scrollLeft;
                const activeCol = document.getElementById(`col-${currentActiveTab}`);
                if (activeCol) colScrollMemY[currentActiveTab] = activeCol.scrollTop;
            }

            if (state.stage === 'groups') {
                const isGroupsComplete = Object.keys(GROUPS).every(g => (state.groupSelections[g] || []).length === 3);

                let groupsHtml = `<div id="group-scroll-container" class="w-full h-full overflow-y-auto custom-scrollbar p-4"><div class="max-w-md mx-auto pt-6 pb-32">`;
                groupsHtml += `<h2 class="text-3xl font-black mt-2 mb-1 text-center text-blue-400 uppercase tracking-wider">Group Stage</h2>`;
                groupsHtml += `<p class="text-slate-400 text-center mb-8 text-sm font-medium">Select exactly 3 teams from every group to advance.</p>`;

                for (const g in GROUPS) {
                    const selectionCount = (state.groupSelections[g] || []).length;
                    groupsHtml += `
                        <div class="bg-slate-800/60 p-3 rounded-2xl border border-slate-700/80 mb-4 shadow-sm backdrop-blur-sm">
                            <div class="flex items-center justify-between mb-3 border-b border-slate-700/80 pb-2 px-1">
                                <h3 class="text-lg font-bold text-slate-200">Group ${g}</h3>
                                <span class="text-xs text-slate-400 font-bold bg-slate-900/50 px-2 py-1 rounded">${selectionCount}/3 Selected</span>
                            </div>
                            <div class="flex flex-col space-y-1.5">
                    `;
                    GROUPS[g].forEach(teamId => {
                        const team = TEAMS[teamId];
                        const selectedIdx = (state.groupSelections[g] || []).indexOf(teamId);
                        const isSelected = selectedIdx !== -1;
                        let bgClass = 'bg-slate-800/80 border-slate-700/50 text-slate-300 hover:bg-slate-700/80';

                        if (isSelected) {
                            if (selectedIdx === 0) bgClass = 'bg-blue-600/20 border-blue-500/50 text-white';
                            else if (selectedIdx === 1) bgClass = 'bg-cyan-600/20 border-cyan-500/50 text-white';
                            else bgClass = 'bg-purple-600/20 border-purple-500/50 text-white'; // Third place indicator color
                        }

                        groupsHtml += `
                            <div class="flex items-center p-3 rounded-xl border cursor-pointer transition-all ${bgClass}" onclick="window.handleGroupTeamClick('${g}', '${teamId}')">
                                <img src="https://flagcdn.com/w40/${team.code}.png" class="w-7 h-4.5 mr-3 object-cover rounded shadow-sm" alt="flag" />
                                <span class="flex-1 font-semibold text-sm truncate leading-normal pb-[1px]">${team.name}</span>
                                ${isSelected ? `<span class="w-6 h-6 flex items-center justify-center bg-white text-slate-900 font-bold rounded-full text-xs shadow">${selectedIdx + 1}</span>` : ''}
                            </div>
                        `;
                    });
                    groupsHtml += `</div></div>`;
                }

                if (isGroupsComplete) {
                    groupsHtml += `
                        <div class="mt-8 mb-6">
                            <button onclick="window.generateBracket()" class="w-full flex justify-center items-center bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-xl shadow-glow-blue transition-all">
                                Generate Knockout Bracket <span class="ml-2 text-xl">🚀</span>
                            </button>
                        </div>
                    `;
                }
                container.innerHTML = groupsHtml + `</div></div>`;
            }

            else if (state.stage === 'thirds') {
                const totalSelected = state.thirdPlaces.length;
                const availableThirds = Object.keys(GROUPS).map(g => (state.groupSelections[g] || [])[2]).filter(Boolean);

                let thirdsHtml = `
                    <div id="group-scroll-container" class="w-full h-full overflow-y-auto custom-scrollbar p-4">
                        <div class="max-w-md mx-auto pt-6 pb-32">
                        
                        <div class="flex justify-between items-center mb-6 bg-slate-800/80 p-4 rounded-2xl border border-slate-700/80 shadow-sm backdrop-blur-sm">
                             <span class="font-bold text-slate-300">Selected:</span>
                             <span class="font-black text-2xl ${totalSelected === 8 ? 'text-green-400' : 'text-purple-400'}">
                                 ${totalSelected} <span class="text-slate-500 text-lg">/ 8</span>
                             </span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-6">
                `;

                availableThirds.forEach(teamId => {
                    const team = TEAMS[teamId];
                    const isSelected = state.thirdPlaces.includes(teamId);
                    const cls = isSelected ? 'border-purple-500/60 bg-purple-600/20 text-white' : 'border-slate-700/50 bg-slate-800/80 text-slate-300 hover:bg-slate-700/80';

                    thirdsHtml += `
                        <div onclick="window.handleThirdPlaceClick('${teamId}')" class="flex items-center p-3 rounded-xl border cursor-pointer transition-all ${cls}">
                            <img src="https://flagcdn.com/w40/${team.code}.png" class="w-6 h-4 mr-3 object-cover rounded shadow-sm" alt="flag" />
                            <span class="font-medium text-sm truncate leading-normal pb-[1px]">${team.name}</span>
                        </div>
                    `;
                });

                container.innerHTML = thirdsHtml + `
                    </div>
                        <div class="mt-8 mb-6">
                            <button ${totalSelected !== 8 ? 'disabled' : ''} onclick="window.generateBracket()" class="w-full flex justify-center items-center font-bold py-4 rounded-xl transition-all ${totalSelected === 8 ? 'bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white shadow-[0_0_15px_rgba(22,163,74,0.3)]' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}">
                                Generate Bracket <span class="ml-2">🚀</span>
                            </button>
                        </div>
                    </div></div>`;
            }

            else if (state.stage === 'knockout' && state.bracket) {
                let html = `
                    <div class="flex flex-col h-full w-full relative bg-slate-950">
                        <div id="bracket-scroll-container" class="flex-grow flex overflow-x-auto snap-x snap-mandatory custom-scrollbar w-full h-full relative">
                            ${renderVerticalMatchColumn('r32', state.bracket.r32, 16)}
                            ${renderVerticalMatchColumn('r16', state.bracket.r16, 8)}
                            ${renderVerticalMatchColumn('qf', state.bracket.qf, 4)}
                            ${renderVerticalMatchColumn('sf', state.bracket.sf, 2)}
                            ${renderFinalColumn()}
                        </div>
                    </div>
                `;

                // Add Third Place Picker Modal UI if it is active!
                if (state.pickingThird !== null) {
                    const matchIndex = state.pickingThird.matchIndex;
                    const match = state.bracket.r32[matchIndex];
                    const assigned = state.bracket.r32.map(m => m.isThird ? m.t2 : null).filter(Boolean);
                    const allThirds = Object.keys(GROUPS).map(g => state.groupSelections[g]?.[2]).filter(Boolean);

                    let thirdsListHtml = '';
                    allThirds.forEach(teamId => {
                        const team = TEAMS[teamId];
                        const isAssigned = assigned.includes(teamId) && match.t2 !== teamId;
                        const bg = isAssigned ? 'bg-slate-800/50 opacity-40 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-700 cursor-pointer border-slate-600 hover:border-blue-500';
                        const onclick = isAssigned ? '' : `onclick="window.selectThird(${matchIndex}, '${teamId}')"`;

                        thirdsListHtml += `
                            <div class="flex items-center p-3 rounded-xl border transition-all ${bg}" ${onclick}>
                                <img src="https://flagcdn.com/w40/${team.code}.png" class="w-8 h-5 mr-4 rounded shadow-sm object-cover" />
                                <span class="flex-1 font-bold text-[15px] text-slate-200 leading-normal pb-[1px]">${team.name}</span>
                                ${isAssigned ? '<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Assigned</span>' : ''}
                            </div>
                        `;
                    });

                    html += `
                        <div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="window.closeThirdSelector()"></div>
                            <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden flex flex-col relative z-10 animate-in fade-in zoom-in duration-200">
                                <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-850">
                                    <div>
                                        <h3 class="text-lg font-black text-white leading-tight">Select Opponent</h3>
                                        <p class="text-[11px] font-bold text-blue-400 uppercase tracking-widest mt-0.5">${match.label}</p>
                                    </div>
                                    <button onclick="window.closeThirdSelector()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition-colors">✕</button>
                                </div>
                                <div class="p-4 max-h-[60vh] overflow-y-auto custom-scrollbar flex flex-col space-y-2.5">
                                    ${thirdsListHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = html;
                if (!state.pickingThird) setupCarouselTracking();
            }

            // Restore Scroll perfectly
            requestAnimationFrame(() => {
                if (state.stage === 'knockout') {
                    const carousel = document.getElementById('bracket-scroll-container');
                    if (carousel) {
                        carousel.style.scrollBehavior = 'auto';
                        carousel.scrollLeft = bracketScrollMemX;

                        const activeCol = document.getElementById(`col-${currentActiveTab}`);
                        if (activeCol && colScrollMemY[currentActiveTab] !== undefined) {
                            activeCol.style.scrollBehavior = 'auto';
                            activeCol.scrollTop = colScrollMemY[currentActiveTab];
                        }
                    }
                } else {
                    const groupScroll = document.getElementById('group-scroll-container');
                    if (groupScroll) groupScroll.scrollTop = groupScrollMemY;
                }

                if (intentionalScrollReset) {
                    if (state.stage === 'knockout') {
                        const carousel = document.getElementById('bracket-scroll-container');
                        if (carousel) {
                            carousel.style.scrollBehavior = 'auto';
                            carousel.scrollLeft = 0;
                        }
                    }
                    intentionalScrollReset = false;
                }
            });
        }

        initApp();
    </script>
</body>

</html>
